  # CI job to check contract bindings drift after deployment
  # This job runs after contract deployment and smoke tests

name: CI - Contract Bindings Drift Check

on:
  workflow_run:
    workflows: ["CI - Build Checks"]
    types:
      - completed

jobs:
  check-bindings-drift:
    name: Check Contract Bindings Drift
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate contract bindings
        env:
          CONTRACT_ID: ${{ secrets.CONTRACT_ID || format('cat contracts/contract_id.txt') }}
        run: npm run gen:bindings

      - name: Check for uncommitted changes in generated bindings
        run: |
          if [[ -n $(git status --porcelain frontend/src/contracts/generated) ]]; then
            echo "::error::Run npm run gen:bindings and commit the result. Stale contract bindings detected."
            git --no-pager diff frontend/src/contracts/generated
            exit 1
          fi
          echo "Bindings are up to date."
